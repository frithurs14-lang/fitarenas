<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitLife - Forgot Password</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">

    <div class="auth-container">

        <div class="auth-logo">
            <h1>🏃 FitLife</h1>
            <p>সুস্থ থাকো, সংযুক্ত থাকো</p>
        </div>

        <div class="auth-card">
            <h2>Password ভুলে গেছ?</h2>
            <p class="auth-subtitle">তোমার email দাও, আমরা reset link পাঠাবো</p>

            <div id="error-msg" class="error-msg hidden"></div>
            <div id="success-msg" class="success-msg hidden"></div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="তোমার email দাও" />
            </div>

            <button class="btn-primary" onclick="handleForgot()">Reset Link পাঠাও</button>

            <div class="auth-links">
                <a href="index.html">← Login এ ফিরে যাও</a>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>

</body>
</html>
